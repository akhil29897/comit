name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dev dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Smoke-test the CLI on demo data
        run: bun run demo
