# Publishes the reveal.js presentation to GitHub Pages.
# Enable it once: repo Settings → Pages → Source: "GitHub Actions".
name: Deploy presentation to Pages

on:
  push:
    branches: [main]
    paths:
      - "presentation/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload presentation
        uses: actions/upload-pages-artifact@v3
        with:
          path: presentation
      - id: deployment
        uses: actions/deploy-pages@v4
