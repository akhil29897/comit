<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1280" width="1280" height="1280" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#075E54"/>
      <stop offset="0.55" stop-color="#128C7E"/>
      <stop offset="1" stop-color="#25D366"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.32" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="1280" fill="url(#g)"/>
  <rect width="1280" height="1280" fill="url(#glow)"/>

  <!-- content lives in the central 640-tall band (y 320..960) so a centre crop is clean -->
  <g transform="translate(0,320)">
    <text x="100" y="208" font-size="44" fill="#ffffff" opacity="0.95">✦</text>
    <text x="96" y="330" font-size="150" font-weight="bold" fill="#ffffff" letter-spacing="-5">comit</text>
    <text x="100" y="392" font-size="36" fill="#ffffff">commit to the people who matter</text>
    <text x="100" y="440" font-size="22" fill="#D9F3EC">a privacy-first WhatsApp work-life-balance companion · runs fully offline</text>

    <g font-size="20" fill="#ffffff">
      <rect x="100" y="478" width="170" height="44" rx="22" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.4"/>
      <text x="185" y="506" text-anchor="middle">100% offline</text>
      <rect x="284" y="478" width="220" height="44" rx="22" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.4"/>
      <text x="394" y="506" text-anchor="middle">zero runtime deps</text>
      <rect x="518" y="478" width="90" height="44" rx="22" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.4"/>
      <text x="563" y="506" text-anchor="middle">MIT</text>
    </g>

    <text x="100" y="582" font-size="22" fill="#BDEAD3">github.com/akhil29897/comit</text>

    <g fill="none" stroke-linecap="round">
      <g transform="translate(1010,250)">
        <circle r="92" stroke="#ffffff" stroke-opacity="0.28" stroke-width="16"/>
        <circle r="92" stroke="#ffffff" stroke-width="16" stroke-dasharray="470 578" transform="rotate(-90)"/>
        <text x="0" y="18" text-anchor="middle" font-size="54" font-weight="bold" fill="#ffffff" stroke="none">84</text>
      </g>
      <g transform="translate(1158,165)">
        <circle r="56" stroke="#ffffff" stroke-opacity="0.28" stroke-width="12"/>
        <circle r="56" stroke="#D9FDD3" stroke-width="12" stroke-dasharray="248 352" transform="rotate(-90)"/>
        <text x="0" y="13" text-anchor="middle" font-size="34" font-weight="bold" fill="#ffffff" stroke="none">70</text>
      </g>
      <g transform="translate(1165,370)">
        <circle r="48" stroke="#ffffff" stroke-opacity="0.28" stroke-width="12"/>
        <circle r="48" stroke="#ffffff" stroke-opacity="0.7" stroke-width="12" stroke-dasharray="145 302" transform="rotate(-90)"/>
        <text x="0" y="12" text-anchor="middle" font-size="30" font-weight="bold" fill="#ffffff" stroke="none">48</text>
      </g>
    </g>
  </g>
</svg>
