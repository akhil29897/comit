  <text x="28" y="48" font-family="system-ui, Arial" font-size="30" font-weight="800" fill="#ffffff">comit</text>
  <text x="128" y="48" font-family="system-ui, Arial" font-size="15" fill="#E9F3F1">commit to the people who matter</text>
  <text x="760" y="44" font-family="system-ui, Arial" font-size="13" fill="#CFE6E1">6 chats · 321 msgs · 2026-06-19</text>

  <!-- stat cards -->
  <g font-family="system-ui, Arial">
    <g transform="translate(28,92)">
      <rect width="223" height="92" rx="12" fill="#FFFFFF" stroke="#E7E1D8"/>
      <text x="20" y="50" font-size="30" font-weight="800" fill="#008069">6</text>
      <text x="20" y="74" font-size="13" fill="#667781">conversations tracked</text>
    </g>
    <g transform="translate(263,92)">
      <rect width="223" height="92" rx="12" fill="#FFFFFF" stroke="#E7E1D8"/>
      <text x="20" y="50" font-size="30" font-weight="800" fill="#F4A300">2</text>
      <text x="20" y="74" font-size="13" fill="#667781">replies you owe</text>
