      <g transform="translate(0,66)"><rect width="414" height="56" rx="10" fill="#FFFFFF"/><circle cx="27" cy="28" r="15" fill="#F4A300"/><text x="27" y="33" text-anchor="middle" font-size="14" fill="#fff">↩</text><text x="52" y="24" font-size="13" fill="#111B21">You owe <tspan font-weight="700">Amma</tspan> a reply —</text><text x="52" y="42" font-size="13" fill="#111B21">waiting 3 days. “your cousin is asking…”</text></g>
      <g transform="translate(0,132)"><rect width="414" height="56" rx="10" fill="#FFFFFF"/><circle cx="27" cy="28" r="15" fill="#34B7F1"/><text x="27" y="33" text-anchor="middle" font-size="15" fill="#fff">≀</text><text x="52" y="24" font-size="13" fill="#111B21"><tspan font-weight="700">Amma</tspan> is cooling off:</text><text x="52" y="42" font-size="13" fill="#111B21">~10.9/wk → ~2.0/wk. Reach out?</text></g>
      <g transform="translate(0,198)"><rect width="414" height="56" rx="10" fill="#FFFFFF"/><circle cx="27" cy="28" r="15" fill="#EA4335"/><text x="27" y="33" text-anchor="middle" font-size="15" fill="#fff">!</text><text x="52" y="24" font-size="13" fill="#111B21">Work chatter with <tspan font-weight="700">Vinay</tspan> is</text><text x="52" y="42" font-size="13" fill="#111B21">climbing. Protect your off-hours.</text></g>
      <g transform="translate(0,264)"><rect width="414" height="56" rx="10" fill="#FFFFFF"/><circle cx="27" cy="28" r="15" fill="#008069"/><text x="27" y="33" text-anchor="middle" font-size="14" fill="#fff">⏱</text><text x="52" y="24" font-size="13" fill="#111B21">Your replies to <tspan font-weight="700">Karan</tspan> take</text><text x="52" y="42" font-size="13" fill="#111B21">~15h on average. Tighten that up.</text></g>
    </g>
