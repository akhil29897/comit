<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" width="1000" height="660" role="img" aria-label="comit dashboard preview">
  <defs>
    <linearGradient id="d-brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b14dff"/><stop offset="1" stop-color="#45d0d0"/>
    </linearGradient>
    <linearGradient id="d-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b14dff"/><stop offset="1" stop-color="#b14dff" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="660" rx="14" fill="#0d0d12"/>

  <!-- top bar -->
  <text x="28" y="48" font-family="system-ui, Arial" font-size="30" font-weight="800" fill="url(#d-brand)">comit</text>
  <text x="128" y="48" font-family="system-ui, Arial" font-size="15" fill="#9a9ab4">commit to the people who matter</text>
  <text x="780" y="44" font-family="system-ui, Arial" font-size="13" fill="#6b6b85">6 chats · 321 msgs · 2026-06-19</text>
  <line x1="0" y1="72" x2="1000" y2="72" stroke="#2a2a3a"/>

  <!-- stat cards -->
  <g font-family="system-ui, Arial">
    <g transform="translate(28,92)">
      <rect width="223" height="92" rx="14" fill="#181823" stroke="#2a2a3a"/>
      <text x="20" y="50" font-size="30" font-weight="800" fill="#ececf4">6</text>
      <text x="20" y="74" font-size="13" fill="#9a9ab4">conversations tracked</text>
    </g>
    <g transform="translate(263,92)">
      <rect width="223" height="92" rx="14" fill="#181823" stroke="#2a2a3a"/>
      <text x="20" y="50" font-size="30" font-weight="800" fill="#ffb454">2</text>
      <text x="20" y="74" font-size="13" fill="#9a9ab4">replies you owe</text>
    </g>
    <g transform="translate(498,92)">
      <rect width="223" height="92" rx="14" fill="#181823" stroke="#2a2a3a"/>
      <text x="20" y="50" font-size="30" font-weight="800" fill="#ff5d6c">66</text>
      <text x="20" y="74" font-size="13" fill="#9a9ab4">after-hours work pings</text>
    </g>
    <g transform="translate(733,92)">
      <rect width="239" height="92" rx="14" fill="#181823" stroke="#2a2a3a"/>
      <text x="20" y="50" font-size="30" font-weight="800" fill="#ececf4">83.7</text>
      <text x="20" y="74" font-size="13" fill="#9a9ab4">top bond · Riya</text>
    </g>
  </g>

  <!-- nudges panel -->
  <g transform="translate(28,204)" font-family="system-ui, Arial">
    <rect width="458" height="424" rx="14" fill="#181823" stroke="#2a2a3a"/>
    <text x="22" y="36" font-size="12" letter-spacing="1.5" font-weight="700" fill="#9a9ab4">NUDGES · WHAT TO DO</text>
    <g transform="translate(22,58)">
      <g transform="translate(0,0)"><rect width="30" height="30" rx="9" fill="#1f1f2c" stroke="#ff5d6c33"/><text x="15" y="20" text-anchor="middle" font-size="15" fill="#ff5d6c">⚠</text><text x="42" y="13" font-size="13" fill="#ececf4"><tspan font-weight="700">Vinay</tspan> (work) reached you after hours</text><text x="42" y="30" font-size="13" fill="#ececf4">44× recently. Consider muting.</text></g>
      <g transform="translate(0,62)"><rect width="30" height="30" rx="9" fill="#1f1f2c" stroke="#ffb45433"/><text x="15" y="20" text-anchor="middle" font-size="15" fill="#ffb454">↩</text><text x="42" y="13" font-size="13" fill="#ececf4">You owe <tspan font-weight="700">Amma</tspan> a reply —</text><text x="42" y="30" font-size="13" fill="#ececf4">waiting 3 days. “your cousin is asking…”</text></g>
      <g transform="translate(0,124)"><rect width="30" height="30" rx="9" fill="#1f1f2c" stroke="#6aa8ff33"/><text x="15" y="20" text-anchor="middle" font-size="15" fill="#6aa8ff">≀</text><text x="42" y="13" font-size="13" fill="#ececf4"><tspan font-weight="700">Amma</tspan> is cooling off:</text><text x="42" y="30" font-size="13" fill="#ececf4">~10.9/wk → ~2.0/wk. Reach out?</text></g>
      <g transform="translate(0,186)"><rect width="30" height="30" rx="9" fill="#1f1f2c" stroke="#ff5d6c33"/><text x="15" y="20" text-anchor="middle" font-size="15" fill="#ff5d6c">⚠</text><text x="42" y="13" font-size="13" fill="#ececf4">Work chatter with <tspan font-weight="700">Vinay</tspan> is</text><text x="42" y="30" font-size="13" fill="#ececf4">climbing. Protect your off-hours.</text></g>
      <g transform="translate(0,248)"><rect width="30" height="30" rx="9" fill="#1f1f2c" stroke="#45d0d033"/><text x="15" y="20" text-anchor="middle" font-size="15" fill="#45d0d0">⏱</text><text x="42" y="13" font-size="13" fill="#ececf4">Your replies to <tspan font-weight="700">Karan</tspan> take</text><text x="42" y="30" font-size="13" fill="#ececf4">~15h on average. Tighten that up.</text></g>
    </g>
  </g>

  <!-- right column: contacts + donut -->
  <g transform="translate(498,204)" font-family="system-ui, Arial">
    <rect width="474" height="206" rx="14" fill="#181823" stroke="#2a2a3a"/>
    <text x="22" y="36" font-size="12" letter-spacing="1.5" font-weight="700" fill="#9a9ab4">RELATIONSHIPS · INTERACTION SCORE</text>
    <!-- ring cards -->
    <g transform="translate(22,54)">
      <g><circle cx="34" cy="34" r="26" fill="none" stroke="#2a2a3a" stroke-width="6"/><circle cx="34" cy="34" r="26" fill="none" stroke="#46d398" stroke-width="6" stroke-linecap="round" stroke-dasharray="137 163" transform="rotate(-90 34 34)"/><text x="34" y="40" text-anchor="middle" font-size="15" font-weight="800" fill="#ececf4">84</text><text x="72" y="30" font-size="14" font-weight="700" fill="#ececf4">Riya</text><text x="72" y="47" font-size="11" fill="#9a9ab4">thriving · personal</text></g>
      <g transform="translate(215,0)"><circle cx="34" cy="34" r="26" fill="none" stroke="#2a2a3a" stroke-width="6"/><circle cx="34" cy="34" r="26" fill="none" stroke="#46d398" stroke-width="6" stroke-linecap="round" stroke-dasharray="129 163" transform="rotate(-90 34 34)"/><text x="34" y="40" text-anchor="middle" font-size="15" font-weight="800" fill="#ececf4">79</text><text x="72" y="30" font-size="14" font-weight="700" fill="#ececf4">Vinay</text><text x="72" y="47" font-size="11" fill="#9a9ab4">thriving · work</text></g>
      <g transform="translate(0,84)"><circle cx="34" cy="34" r="26" fill="none" stroke="#2a2a3a" stroke-width="6"/><circle cx="34" cy="34" r="26" fill="none" stroke="#45d0d0" stroke-width="6" stroke-linecap="round" stroke-dasharray="114 163" transform="rotate(-90 34 34)"/><text x="34" y="40" text-anchor="middle" font-size="15" font-weight="800" fill="#ececf4">70</text><text x="72" y="30" font-size="14" font-weight="700" fill="#ececf4">Amma</text><text x="72" y="47" font-size="11" fill="#9a9ab4">steady · owe 3 days</text></g>
      <g transform="translate(215,84)"><circle cx="34" cy="34" r="26" fill="none" stroke="#2a2a3a" stroke-width="6"/><circle cx="34" cy="34" r="26" fill="none" stroke="#45d0d0" stroke-width="6" stroke-linecap="round" stroke-dasharray="79 163" transform="rotate(-90 34 34)"/><text x="34" y="40" text-anchor="middle" font-size="15" font-weight="800" fill="#ececf4">48</text><text x="72" y="30" font-size="14" font-weight="700" fill="#ececf4">DARPAN Crew</text><text x="72" y="47" font-size="11" fill="#9a9ab4">steady · group</text></g>
    </g>
  </g>

  <g transform="translate(498,424)" font-family="system-ui, Arial">
    <rect width="474" height="204" rx="14" fill="#181823" stroke="#2a2a3a"/>
    <text x="22" y="36" font-size="12" letter-spacing="1.5" font-weight="700" fill="#9a9ab4">WORK-LIFE BALANCE</text>
    <!-- donut -->
    <g transform="translate(90,120)">
      <circle r="48" fill="none" stroke="#d27dff" stroke-width="15"/>
      <circle r="48" fill="none" stroke="#6aa8ff" stroke-width="15" stroke-dasharray="106 302" transform="rotate(-90)"/>
      <text x="0" y="-2" text-anchor="middle" font-size="22" font-weight="800" fill="#ececf4">35%</text>
      <text x="0" y="16" text-anchor="middle" font-size="11" fill="#9a9ab4">work</text>
    </g>
    <!-- weekday bars -->
    <g transform="translate(200,72)">
      <rect x="0"   y="20" width="28" height="70" rx="5" fill="url(#d-bar)"/>
      <rect x="38"  y="14" width="28" height="76" rx="5" fill="url(#d-bar)"/>
      <rect x="76"  y="40" width="28" height="50" rx="5" fill="url(#d-bar)"/>
      <rect x="114" y="18" width="28" height="72" rx="5" fill="url(#d-bar)"/>
      <rect x="152" y="24" width="28" height="66" rx="5" fill="url(#d-bar)"/>
      <rect x="190" y="14" width="28" height="76" rx="5" fill="url(#d-bar)"/>
      <rect x="228" y="52" width="28" height="38" rx="5" fill="url(#d-bar)"/>
      <text x="128" y="118" text-anchor="middle" font-size="12" fill="#9a9ab4"><tspan font-weight="800" fill="#ff5d6c">66</tspan> after-hours work pings · busiest 11 PM</text>
    </g>
  </g>
</svg>
