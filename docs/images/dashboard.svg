      <g transform="translate(215,0)"><circle cx="34" cy="34" r="26" fill="none" stroke="#E7E1D8" stroke-width="6"/><circle cx="34" cy="34" r="26" fill="none" stroke="#25D366" stroke-width="6" stroke-linecap="round" stroke-dasharray="129 163" transform="rotate(-90 34 34)"/><text x="34" y="40" text-anchor="middle" font-size="15" font-weight="800" fill="#111B21">79</text><text x="72" y="30" font-size="14" font-weight="700" fill="#111B21">Vinay</text><text x="72" y="47" font-size="11" fill="#667781">thriving · work</text></g>
      <g transform="translate(0,84)"><circle cx="34" cy="34" r="26" fill="none" stroke="#E7E1D8" stroke-width="6"/><circle cx="34" cy="34" r="26" fill="none" stroke="#128C7E" stroke-width="6" stroke-linecap="round" stroke-dasharray="114 163" transform="rotate(-90 34 34)"/><text x="34" y="40" text-anchor="middle" font-size="15" font-weight="800" fill="#111B21">70</text><text x="72" y="30" font-size="14" font-weight="700" fill="#111B21">Amma</text><text x="72" y="47" font-size="11" fill="#667781">steady · owe 3 days</text></g>
      <g transform="translate(215,84)"><circle cx="34" cy="34" r="26" fill="none" stroke="#E7E1D8" stroke-width="6"/><circle cx="34" cy="34" r="26" fill="none" stroke="#128C7E" stroke-width="6" stroke-linecap="round" stroke-dasharray="79 163" transform="rotate(-90 34 34)"/><text x="34" y="40" text-anchor="middle" font-size="15" font-weight="800" fill="#111B21">48</text><text x="72" y="30" font-size="14" font-weight="700" fill="#111B21">DARPAN Crew</text><text x="72" y="47" font-size="11" fill="#667781">steady · group</text></g>
    </g>
  </g>

