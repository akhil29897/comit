<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" width="1000" height="660" role="img" aria-label="comit dashboard preview">
  <defs>
    <linearGradient id="d-head" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#075E54"/><stop offset="1" stop-color="#128C7E"/>
    </linearGradient>
